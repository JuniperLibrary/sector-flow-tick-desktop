<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0F172A"/>
  <!-- chart grid -->
  <g stroke="#1E293B" stroke-width="2">
    <line x1="100" y1="380" x2="412" y2="380"/>
    <line x1="100" y1="290" x2="412" y2="290"/>
    <line x1="100" y1="200" x2="412" y2="200"/>
    <line x1="100" y1="110" x2="412" y2="110"/>
  </g>
  <!-- bars -->
  <!-- bar 1: down (green) -->
  <rect x="120" y="320" width="36" height="60" rx="4" fill="#22C55E" opacity="0.8"/>
  <!-- bar 2: up (red) -->
  <rect x="180" y="170" width="36" height="210" rx="4" fill="#EF4444" opacity="0.85"/>
  <!-- bar 3: up (red) -->
  <rect x="240" y="200" width="36" height="180" rx="4" fill="#EF4444" opacity="0.7"/>
  <!-- bar 4: down (green) -->
  <rect x="300" y="300" width="36" height="80" rx="4" fill="#22C55E" opacity="0.75"/>
  <!-- bar 5: up (red) -->
  <rect x="360" y="140" width="36" height="240" rx="4" fill="#EF4444" opacity="0.9"/>
  <!-- axis line -->
  <line x1="80" y1="100" x2="80" y2="400" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="400" x2="430" y2="400" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
  <!-- title -->
  <text x="256" y="70" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#94A3B8" text-anchor="middle" letter-spacing="2">板块资金流</text>
  <text x="256" y="460" font-family="system-ui, sans-serif" font-size="24" font-weight="400" fill="#64748B" text-anchor="middle" letter-spacing="1">SECTOR FLOW</text>
</svg>
