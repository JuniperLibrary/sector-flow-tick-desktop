name: Build and Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macOS
            ext: dmg
          - os: windows-latest
            platform: Windows
            ext: exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build and package (${{ matrix.platform }})
        run: npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: release/*.${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true
          path: _release

      - name: List installers
        run: ls -lh _release/

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 资金流向实时监控 ${{ github.ref_name }}

            请根据操作系统选择对应的安装包下载：

            | 平台 | 安装包 |
            |---|---|
            | Windows | `*-Setup-*.exe` |
            | macOS | `*.dmg` |

            ---
          generate_release_notes: true
          files: _release/*
          draft: false
          prerelease: false
