name: Build and Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macOS
            bundles: dmg
            bundle_pattern: src-tauri/target/release/bundle/**/*.dmg
            ext: dmg
          - os: windows-latest
            platform: Windows
            bundles: nsis
            bundle_pattern: src-tauri/target/release/bundle/**/*.exe
            ext: exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: Install dependencies
        run: npm ci
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Build and package (${{ matrix.platform }})
        run: npm run dist -- --bundles ${{ matrix.bundles }}
        env:
          CARGO_NET_RETRY: 3
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Locate and flatten installer
        shell: bash
        run: |
          mkdir -p _installer
          shopt -s globstar nullglob
          for f in src-tauri/target/release/bundle/**/*.exe src-tauri/target/release/bundle/**/*.dmg; do
            [ -f "$f" ] && cp "$f" _installer/
          done
          ls -lh _installer/

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: _installer/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true
          path: _release

      - name: List installers
        run: ls -lh _release/

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 资金流向实时监控 ${{ github.ref_name }}

            基于 Tauri v2 + Rust，安装包仅 4.3 MB（相比 Electron 版缩小 95%）。

            请根据操作系统选择对应的安装包下载：

            | 平台 | 安装包 |
            |---|---|
            | Windows | `*.exe` |
            | macOS | `*.dmg` |

            ---
          generate_release_notes: true
          files: _release/*
          draft: false
          prerelease: false
